<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Chat TF-IDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <header class="bg-blue-600 text-white p-4 shadow-md">
        <h1 class="text-xl font-bold text-center">Chat PDF (TF-IDF)</h1>
    </header>

    <main class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-box">
        </main>

    <footer class="p-4 bg-white border-t">
        <div class="max-w-4xl mx-auto flex flex-col gap-2">
            <input type="file" id="pdf-input" accept="application/pdf" class="text-sm text-gray-500">
            <div class="flex gap-2">
                <input type="text" id="user-input" placeholder="Pergunte algo sobre o PDF..." class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="sendMessage()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Enviar</button>
            </div>
        </div>
    </footer>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const fileInput = document.getElementById('pdf-input');
            const chatBox = document.getElementById('chat-box');

            if (!input.value || fileInput.files.length === 0) {
                alert("Por favor, selecione um PDF e digite uma mensagem.");
                return;
            }

            // UI: Adicionar mensagem do usuário
            chatBox.innerHTML += `<div class="text-right"><span class="bg-blue-100 p-2 rounded-lg">${input.value}</span></div>`;

            const formData = new FormData();
            formData.append('pdf', fileInput.files[0]);
            formData.append('question', input.value);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                chatBox.innerHTML += `<div class="text-left"><span class="bg-gray-200 p-2 rounded-lg">${data.answer}</span></div>`;
            } catch (err) {
                chatBox.innerHTML += `<div class="text-red-500">Erro ao processar requisição.</div>`;
            }

            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
